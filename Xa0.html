<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe • Dark</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #121212;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            background: #1e1e1e;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7), inset 0 0 0 1px #333;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
            margin-bottom: 25px;
            font-size: 1.2rem;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        .cell {
            aspect-ratio: 1 / 1;
            background: #2a2a2a;
            border: none;
            border-radius: 20px;
            font-size: 3rem;
            font-weight: 700;
            color: #00ff99;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f0f0f;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
        }
        .cell:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f0f0f;
        }
        .cell.X {
            color: #00ff99;
            text-shadow: 0 0 8px #00ff9966;
        }
        .cell.O {
            color: #ff6666;
            text-shadow: 0 0 8px #ff6666;
        }
        .cell:disabled {
            opacity: 0.8;
            cursor: not-allowed;
        }
        .status {
            color: #bbb;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 2rem;
        }
        .btn {
            background: #2a2a2a;
            border: none;
            border-radius: 60px;
            padding: 14px 30px;
            color: #e0e0e0;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f0f0f;
            transition: 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f0f0f;
        }
        .btn:hover {
            background: #3a3a3a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Tic-Tac-Toe</h2>

        <div class="board" id="board">
            <!-- 9 кнопок генерируются скриптом -->
        </div>

        <div class="status" id="status">Ход X</div>
        <button class="btn" id="resetBtn">Новая игра</button>
    </div>

    <script>
        (function() {
            const boardEl = document.getElementById('board');
            const statusEl = document.getElementById('status');
            const resetBtn = document.getElementById('resetBtn');

            let board = ['', '', '', '', '', '', '', '', ''];
            let currentPlayer = 'X';
            let gameActive = true;

            const winPatterns = [
                [0,1,2],[3,4,5],[6,7,8],
                [0,3,6],[1,4,7],[2,5,8],
                [0,4,8],[2,4,6]
            ];

            function renderBoard() {
                boardEl.innerHTML = '';
                board.forEach((value, index) => {
                    const btn = document.createElement('button');
                    btn.className = `cell ${value}`;
                    btn.textContent = value;
                    btn.disabled = !gameActive || value !== '';
                    btn.addEventListener('click', () => handleClick(index));
                    boardEl.appendChild(btn);
                });
            }

            function handleClick(index) {
                if (!gameActive || board[index] !== '') return;
                board[index] = currentPlayer;
                renderBoard();

                const winner = checkWinner();
                if (winner) {
                    statusEl.textContent = `Победил ${winner}!`;
                    gameActive = false;
                } else if (board.every(cell => cell !== '')) {
                    statusEl.textContent = 'Ничья!';
                    gameActive = false;
                } else {
                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                    statusEl.textContent = `Ход ${currentPlayer}`;
                }
            }

            function checkWinner() {
                for (let pattern of winPatterns) {
                    const [a,b,c] = pattern;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        return board[a];
                    }
                }
                return null;
            }

            function resetGame() {
                board = ['', '', '', '', '', '', '', '', ''];
                currentPlayer = 'X';
                gameActive = true;
                renderBoard();
                statusEl.textContent = 'Ход X';
            }

            resetBtn.addEventListener('click', resetGame);
            renderBoard();
        })();
    </script>
</body>
</html>
